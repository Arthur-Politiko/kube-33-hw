apiVersion: apps/v1
kind: Deployment
metadata: 
  name: cache
  namespace: app
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: cache
  template:
    metadata:
      labels:
        app: cache
    spec:
      containers:

      - name: multitool
        image: wbitt/network-multitool:latest
        ports:
        - containerPort: 8080
        env:                           
          - name: HTTP_PORT
            value: "8080"              # tune multitool to listen on 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
